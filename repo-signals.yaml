# ─────────────────────────────────────────────────────────────────────────────
# repo-signals.yaml – ContextWeave / ExpertiseRAG
#
# Structured expertise signals for the ExpertiseRAG GraphRAG system.
# Evidence weight: 0.7 (high-authority structured metadata).
#
# This file is uploaded to S3 (raw/contextweave/repo-signals.yaml) by the
# GitHub Actions workflow after every successful SAM deploy, and ingested
# into the Bedrock Knowledge Base → Neptune Analytics graph.
# ─────────────────────────────────────────────────────────────────────────────

schema_version: "1.0"
generated_at: "2026-03-20"
repo: contextweave
owner: rajatarun

# ─────────────────────────────────────────────────────────────────────────────
# Project metadata
# ─────────────────────────────────────────────────────────────────────────────
project:
  name: ContextWeave / ExpertiseRAG
  type: production-platform
  domain: graphrag-expertise-retrieval
  description: >
    AWS-native GraphRAG platform with adaptive RAG routing. Combines Amazon
    Bedrock Knowledge Bases with Neptune Analytics to answer deep,
    evidence-backed questions about a developer's professional expertise.
    An agentic routing layer classifies every document at ingestion time and
    at query time selects the optimal retrieval strategy from a self-improving
    Neptune graph. Uses semantic retrieval + graph traversal for evidence
    synthesis.
  aws_account: "239571291755"
  region: us-east-1
  stack_names:
    dev: expertise-rag-dev
    staging: expertise-rag-staging
    prod: expertise-rag-prod
  cicd:
    platform: github-actions
    auth_method: oidc-keyless
    deploy_role: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
    stages:
      - sam-validate
      - sam-build
      - sam-deploy
      - s3-artifact-upload

# ─────────────────────────────────────────────────────────────────────────────
# Architecture patterns demonstrated
# ─────────────────────────────────────────────────────────────────────────────
architecture_patterns:
  - name: GraphRAG
    description: >
      Graph-augmented retrieval-augmented generation. Combines vector
      similarity search (Bedrock KB) with graph traversal (Neptune Analytics)
      to surface co-occurring skills, pattern evidence, and cross-repository
      context that pure vector search cannot recover.
    evidence_files:
      - src/query_api/graph_expander.py
      - src/query_api/retriever.py
      - src/preprocessor/graph_builder.py
    repeat_count: 1

  - name: Serverless Event-Driven Architecture
    description: >
      Fully serverless. S3 ObjectCreated events trigger Lambda. Step Functions
      orchestrates multi-step workflows without any always-on compute. API
      Gateway routes HTTP requests to Lambda. No EC2, no containers.
    evidence_files:
      - template.yaml
      - src/preprocessor/handler.py
      - src/ingestion_trigger/handler.py
    repeat_count: 1

  - name: Hierarchical RAG Chunking
    description: >
      Parent chunks (1500 tokens) preserve full section context for answer
      synthesis; child chunks (300 tokens) are the precision retrieval units.
      60-token overlap ensures continuity at boundaries.
    evidence_files:
      - template.yaml  # BedrockDataSource HierarchicalChunkingConfiguration
    repeat_count: 1

  - name: Infrastructure as Code (SAM)
    description: >
      All AWS resources defined in template.yaml using AWS SAM. Reproducible
      across dev / staging / prod environments via samconfig.toml. CI/CD
      deploys exclusively via SAM CLI, never via console clicks.
    evidence_files:
      - template.yaml
      - samconfig.toml
      - .github/workflows/deploy.yaml
    repeat_count: 1

  - name: Least-Privilege IAM
    description: >
      Every Lambda has a separate IAM role with only the permissions required
      for that function. No wildcard resource ARNs except where unavoidable
      (X-Ray, CloudWatch). S3 access scoped to specific prefixes.
    evidence_files:
      - template.yaml  # PreprocessorRole, QueryAPIRole, IngestionTriggerRole
    repeat_count: 1

  - name: OIDC Keyless Authentication
    description: >
      GitHub Actions assumes the deployer IAM role via OIDC token exchange.
      No long-lived AWS access keys stored in GitHub secrets. Token scoped
      to specific repo and workflow run.
    evidence_files:
      - .github/workflows/deploy.yaml
    repeat_count: 1

  - name: Adaptive RAG Routing
    description: >
      Agentic routing layer that classifies every document at ingestion time
      into a DocumentType (technical_spec, narrative, structured_data, code,
      diagram_derived) and recommends the best ChunkingStrategy. At query
      time, a RAGRouter reads EFFECTIVE_FOR edge weights from Neptune to
      select the optimal retrieval strategy (graph_first, hybrid,
      keyword_boosted, semantic_search). After each query, the winning
      strategy's weight is updated based on answer confidence, making the
      routing graph self-improving without any retraining.
    evidence_files:
      - src/preprocessor/routing_analyzer.py
      - src/query_api/rag_router.py
      - src/query_api/handler.py
      - src/shared/models.py
    repeat_count: 1

  - name: Self-Improving Knowledge Graph
    description: >
      Neptune Analytics routing sub-graph with EFFECTIVE_FOR edges between
      RAGStrategy and DocumentType nodes. Weights are seeded from ROUTING_PRIORS
      at deploy time and updated after every query (confidence >= 0.70:
      weight +0.05; confidence < 0.40: weight -0.02; clamped to [0.10, 1.00]).
      Strategies that consistently produce high-confidence answers accumulate
      higher weights and are selected more often, creating a compounding
      improvement loop with zero manual intervention.
    evidence_files:
      - src/query_api/rag_router.py
      - src/shared/models.py
      - docs/graph_schema.md
    repeat_count: 1

# ─────────────────────────────────────────────────────────────────────────────
# Software design patterns (GoF + cloud-native)
# ─────────────────────────────────────────────────────────────────────────────
design_patterns:

  # ── GoF patterns ─────────────────────────────────────────────────────────

  - name: Strategy Pattern (Chunking)
    category: gof-behavioural
    description: >
      Runtime selection of the text-chunking algorithm based on DocumentType.
      `chunk_text()` in chunker.py dispatches to `_chunk_hierarchical()`,
      `_chunk_sentence()`, or `_chunk_fixed()` depending on the strategy
      recommended by the routing analyzer. New chunking strategies can be
      added without touching the dispatcher.
    evidence_files:
      - src/shared/chunker.py
      - src/preprocessor/routing_analyzer.py

  - name: Strategy Pattern (RAG Retrieval)
    category: gof-behavioural
    description: >
      Four interchangeable retrieval strategies (semantic_search, graph_first,
      keyword_boosted, hybrid) share a common interface. RAGRouter selects the
      strategy at runtime by reading learned EFFECTIVE_FOR weights from Neptune;
      `retrieve_with_strategy()` dispatches to the chosen implementation.
    evidence_files:
      - src/query_api/rag_router.py
      - src/query_api/retriever.py

  - name: Builder Pattern
    category: gof-creational
    description: >
      `GraphBuilder` in graph_builder.py is a stateful accumulator. Callers
      repeatedly invoke `add_extraction()` for each document; the builder
      deduplicates nodes and edges using stable IDs, then finalises the graph
      with `build()` or persists it via `write_to_neptune()`. Separates
      construction from representation.
    evidence_files:
      - src/preprocessor/graph_builder.py

  - name: Factory Pattern (Extractor Dispatch)
    category: gof-creational
    description: >
      `extract()` in extractors.py acts as a factory function: given a file
      path and its content, it selects and invokes the correct extractor
      (`extract_markdown`, `extract_yaml`, `extract_plantuml`, `extract_text`)
      based on file extension, returning a uniform output envelope regardless
      of the underlying extractor used.
    evidence_files:
      - src/preprocessor/extractors.py

  - name: Template Method Pattern
    category: gof-behavioural
    description: >
      The preprocessor `lambda_handler()` defines the invariant skeleton of
      the document processing algorithm — parse event → extract → route-classify
      → build graph → write derived artifacts — while delegating each step to
      specialised helper functions that can be evolved independently.
    evidence_files:
      - src/preprocessor/handler.py

  - name: Facade Pattern
    category: gof-structural
    description: >
      `_run_query_pipeline()` in query_api/handler.py presents a single
      unified entry point to a five-stage reasoning pipeline (classify →
      RAGRouter.select_strategy → retrieve_with_strategy → expand_graph_context
      → synthesize_answer → RAGRouter.update_feedback). Callers interact with
      one function; internal orchestration complexity is hidden behind the facade.
    evidence_files:
      - src/query_api/handler.py

  - name: Command Pattern (Action Dispatch)
    category: gof-behavioural
    description: >
      The ingestion-trigger Lambda dispatches on an `action` field in the
      event payload: `start`, `status`, `seed_routing`, `empty_all`, etc.
      Each action is encapsulated in its own function, making it trivial to
      add or remove operations without changing the dispatcher.
    evidence_files:
      - src/ingestion_trigger/handler.py

  - name: Observer Pattern (Confidence Feedback Loop)
    category: gof-behavioural
    description: >
      After every synthesized answer, `RAGRouter.update_feedback()` observes
      the answer confidence score and adjusts the `EFFECTIVE_FOR` edge weight
      for the winning strategy in Neptune. Confidence ≥ 0.70 → +0.05 (reinforce);
      confidence < 0.40 → −0.02 (penalise). The routing graph acts as the
      subject; the feedback function is the observer that mutates it.
    evidence_files:
      - src/query_api/rag_router.py

  - name: Singleton / Connection Pool Pattern
    category: gof-creational
    description: >
      AWS SDK and Neptune clients are initialised once per Lambda container
      lifecycle and cached in module-level globals. `get_neptune_client()` and
      `_get_bedrock_client()` in db_clients.py return the cached instance on
      warm invocations, avoiding repeated TCP handshakes and auth overhead.
    evidence_files:
      - src/shared/db_clients.py

  - name: Adapter Pattern (JSON ↔ Dataclass)
    category: gof-structural
    description: >
      `QueryRequest.from_dict()`, `RetrievedChunk.to_dict()`, and
      `QueryResponse.to_dict()` in models.py adapt the camelCase HTTP request
      and response shapes to and from the snake_case Python dataclasses used
      internally, preventing HTTP-layer concerns from leaking into business logic.
    evidence_files:
      - src/shared/models.py

  - name: Chain of Responsibility (Classification Fallback)
    category: gof-behavioural
    description: >
      `classify_question()` in synthesizer.py tries handlers in order:
      model-based classification → regex-pattern matching → default fallback
      to "general". Each handler attempts to satisfy the request; if it cannot,
      responsibility is passed to the next handler in the chain.
    evidence_files:
      - src/query_api/synthesizer.py

  # ── Cloud / distributed patterns ─────────────────────────────────────────

  - name: Polling Pattern (Async Job Completion)
    category: cloud-async
    description: >
      The Step Functions state machine uses a Wait → CheckStatus → branch loop
      to monitor the Bedrock Knowledge Base ingestion job. Rather than blocking
      a Lambda for potentially minutes, the orchestrator polls at a fixed
      interval and branches on COMPLETE / FAILED / IN_PROGRESS, avoiding
      Lambda timeout limits for long-running operations.
    evidence_files:
      - template.yaml  # WaitForIngestion + CheckIngestionStatus states

  - name: Retry with Exponential Backoff
    category: cloud-resilience
    description: >
      Step Functions state machine tasks declare `Retry` blocks with
      `BackoffRate: 2` and `MaxAttempts: 3`, providing automatic exponential
      backoff for transient service errors. The GitHub Actions workflow also
      retries SAM deploy steps on network failures.
    evidence_files:
      - template.yaml
      - .github/workflows/deploy.yaml

  - name: Circuit Breaker (Connection Health Check)
    category: cloud-resilience
    description: >
      Before returning a cached Neptune or Bedrock client, db_clients.py
      performs a lightweight connectivity probe (`verify_connectivity()`).
      If the probe fails, the cached reference is cleared and a fresh connection
      is established, preventing cascading failures from stale client state.
    evidence_files:
      - src/shared/db_clients.py

  - name: CloudFormation Custom Resource Pattern
    category: cloud-iac
    description: >
      `PostDeploymentIngestionJob` is a CloudFormation custom resource backed
      by the IngestionTriggerFunction Lambda. On stack Create/Update events,
      it seeds the Neptune routing graph and kicks off the initial Bedrock KB
      ingestion job, then signals success or failure to CloudFormation via a
      pre-signed S3 URL callback.
    evidence_files:
      - src/ingestion_trigger/handler.py
      - template.yaml  # AWS::CloudFormation::CustomResource

  - name: Idempotency Pattern
    category: cloud-reliability
    description: >
      All schema-init and graph-seed operations use upsert semantics (SQL
      `IF NOT EXISTS`, openCypher `MERGE`) so they are safe to run multiple
      times without side effects. This makes CloudFormation stack updates,
      Lambda retries, and manual re-seeds all idempotent by construction.
    evidence_files:
      - src/ingestion_trigger/handler.py
      - src/preprocessor/graph_builder.py

  - name: Bulkhead Pattern (Lambda Isolation)
    category: cloud-resilience
    description: >
      Each Lambda function (Preprocessor, Query API, IngestionTrigger) is
      deployed with independent memory, timeout, IAM role, and log group.
      Resource exhaustion or a runaway request in one function cannot affect
      the others, containing blast radius to the function boundary.
    evidence_files:
      - template.yaml  # Globals + per-function overrides

  - name: Secrets Manager Integration
    category: cloud-security
    description: >
      Database credentials and API keys are stored in AWS Secrets Manager.
      Lambda functions retrieve secrets at cold-start and cache them for the
      container lifetime. No credentials appear in environment variables or
      source code.
    evidence_files:
      - src/shared/db_clients.py
      - template.yaml  # AWS::SecretsManager::Secret

# ─────────────────────────────────────────────────────────────────────────────
# AWS services used
# ─────────────────────────────────────────────────────────────────────────────
aws_services:
  compute:
    - service: AWS Lambda
      runtime: python3.12
      count: 3
      functions:
        - expertise-rag-preprocessor
        - expertise-rag-query-api
        - expertise-rag-ingestion-trigger
      depth: advanced   # custom event routing, custom resource, Step Functions integration

  storage:
    - service: Amazon S3
      usage: artifact-store
      encryption: SSE-KMS
      depth: advanced   # bucket notification, lifecycle, versioning, bucket policy, KMS

  database:
    - service: Amazon Neptune Analytics
      usage: vector-graph-hybrid-store
      query_language: openCypher
      vector_dimension: 1024
      depth: advanced   # GraphRAG traversal, vector similarity, custom node/edge schema

  ai_ml:
    - service: Amazon Bedrock Knowledge Bases
      usage: rag-knowledge-base
      vector_store: Neptune Analytics
      chunking: HIERARCHICAL
      depth: advanced

    - service: Amazon Bedrock (Titan Text Embeddings V2)
      usage: 1024-dim-embeddings
      model_id: amazon.titan-embed-text-v2:0
      depth: intermediate

    - service: Amazon Bedrock (Claude 3 Haiku)
      usage: document-parsing-during-ingestion
      model_id: anthropic.claude-3-haiku-20240307-v1:0
      depth: intermediate

    - service: Amazon Bedrock (Converse API)
      usage: answer-synthesis
      depth: advanced   # grounded system prompts, structured JSON response schema

  integration:
    - service: Amazon API Gateway (HTTP API v2)
      usage: rest-api
      depth: intermediate   # throttling, CORS, access logging, stage config

    - service: AWS Step Functions
      usage: ingestion-orchestration
      type: STANDARD
      depth: advanced   # wait/poll pattern, retry + catch, conditional branching, X-Ray

    - service: Amazon EventBridge
      usage: lambda-event-routing
      depth: intermediate

  security:
    - service: AWS KMS
      usage: SSE-CMK
      depth: intermediate   # key policy, cross-service grants, auto-rotation

    - service: AWS IAM
      usage: least-privilege-roles
      depth: advanced   # resource-scoped policies, condition keys, OIDC federation

    - service: AWS STS
      usage: oidc-assume-role
      depth: intermediate

  observability:
    - service: AWS X-Ray
      usage: distributed-tracing
      depth: intermediate   # active tracing on all Lambdas and Step Functions

    - service: Amazon CloudWatch Logs
      usage: structured-logging
      depth: intermediate   # log groups, retention, access log format

  iac_cicd:
    - service: AWS SAM
      usage: infrastructure-as-code
      depth: advanced   # custom resources, state machine definition, multi-env samconfig

    - service: AWS CloudFormation
      usage: underlying-iac
      depth: intermediate

    - service: GitHub Actions
      usage: cicd-pipeline
      depth: advanced   # OIDC, SAM validate stage, build caching, multi-env dispatch

