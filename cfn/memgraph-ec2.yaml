AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Memgraph Community Edition on EC2 (t4g.micro, ARM64, Ubuntu 24.04) with
  Docker Compose, Elastic IP, and SSM Parameter Store integration.
  Part of the ExpertiseRAG / ContextWeave platform.

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Description: Project name used to prefix resource names

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access

  AllowedCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR allowed for SSH (22), Bolt (7687), and Memgraph Lab (7444)

  VpcCidr:
    Type: String
    Default: "10.10.0.0/16"
    Description: CIDR block for the new VPC

  SubnetCidr:
    Type: String
    Default: "10.10.1.0/24"
    Description: CIDR block for the public subnet

  MemgraphDockerImage:
    Type: String
    Default: "memgraph/memgraph-platform:latest"
    Description: Docker image for Memgraph (platform includes Lab UI)

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── Networking ───────────────────────────────────────────────────────────────

  MemgraphVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-memgraph-vpc"
        - Key: Project
          Value: ExpertiseRAG
        - Key: ManagedBy
          Value: CloudFormation

  MemgraphSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MemgraphVPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-memgraph-subnet"
        - Key: Project
          Value: ExpertiseRAG

  MemgraphIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-memgraph-igw"
        - Key: Project
          Value: ExpertiseRAG

  MemgraphVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MemgraphVPC
      InternetGatewayId: !Ref MemgraphIGW

  MemgraphRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MemgraphVPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-memgraph-rt"
        - Key: Project
          Value: ExpertiseRAG

  MemgraphDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: MemgraphVPCGatewayAttachment
    Properties:
      RouteTableId: !Ref MemgraphRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref MemgraphIGW

  MemgraphSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MemgraphSubnet
      RouteTableId: !Ref MemgraphRouteTable

  # ── Security Group ───────────────────────────────────────────────────────────

  MemgraphSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Memgraph EC2 – SSH (22), Bolt (7687), Lab UI (7444)
      VpcId: !Ref MemgraphVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 7687
          ToPort: 7687
          CidrIp: !Ref AllowedCidr
          Description: Memgraph Bolt protocol
        - IpProtocol: tcp
          FromPort: 7444
          ToPort: 7444
          CidrIp: !Ref AllowedCidr
          Description: Memgraph Lab UI
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-memgraph-sg"
        - Key: Project
          Value: ExpertiseRAG

  # ── IAM ──────────────────────────────────────────────────────────────────────

  MemgraphInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-memgraph-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: MemgraphSSMAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/memgraph/*"
      Tags:
        - Key: Project
          Value: ExpertiseRAG
        - Key: ManagedBy
          Value: CloudFormation

  MemgraphInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-memgraph-instance-profile"
      Roles:
        - !Ref MemgraphInstanceRole

  # ── EC2 Instance ─────────────────────────────────────────────────────────────

  MemgraphEC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: MemgraphVPCGatewayAttachment
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M
    Properties:
      # Latest Ubuntu 24.04 ARM64 – resolved at deploy time via SSM public parameter
      ImageId: "{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp2/ami-id}}"
      InstanceType: t4g.micro
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref MemgraphInstanceProfile
      SubnetId: !Ref MemgraphSubnet
      SecurityGroupIds:
        - !Ref MemgraphSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euxo pipefail

            # 1. System update
            apt-get update -y && apt-get upgrade -y

            # 2. Install Docker (official repo, ARM64-safe)
            apt-get install -y ca-certificates curl gnupg lsb-release
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
              | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            chmod a+r /etc/apt/keyrings/docker.gpg
            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
              https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
              > /etc/apt/sources.list.d/docker.list
            apt-get update -y
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

            systemctl enable docker && systemctl start docker
            usermod -aG docker ubuntu

            # 3. Write docker-compose.yml
            # Note: ${MemgraphDockerImage} is substituted by CloudFormation Fn::Sub
            # before bash executes; the quoted heredoc delimiter ('COMPOSE') is
            # intentional – bash will write the already-resolved literal value.
            mkdir -p /opt/memgraph
            cat > /opt/memgraph/docker-compose.yml <<'COMPOSE'
            version: "3.8"
            services:
              memgraph:
                image: ${MemgraphDockerImage}
                container_name: memgraph
                restart: always
                ports:
                  - "7687:7687"
                  - "7444:7444"
                volumes:
                  - mg_data:/var/lib/memgraph
                  - mg_log:/var/log/memgraph
                  - mg_etc:/etc/memgraph
                environment:
                  - MEMGRAPH_TELEMETRY_ENABLED=false
                command: >
                  --log-level=WARNING
                  --storage-snapshot-interval-sec=300
                  --storage-wal-enabled=true
                  --storage-snapshot-on-exit=true
                  --storage-recover-on-startup=true
                mem_limit: 700m
                memswap_limit: 700m
            volumes:
              mg_data:
              mg_log:
              mg_etc:
            COMPOSE

            # 4. Start Memgraph
            cd /opt/memgraph && docker compose up -d

            # 5. Wait for Bolt to be ready (up to 30 × 5 s = 150 s)
            for i in $(seq 1 30); do
              if docker exec memgraph mgconsole --no-history \
                   --execute "RETURN 1;" > /dev/null 2>&1; then
                echo "Memgraph ready after ${!i} attempts."
                break
              fi
              sleep 5
            done

            # 6. Signal CloudFormation
            # cfn-bootstrap is not pre-installed on Ubuntu 24.04; install it first.
            pip3 install \
              https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz \
              --break-system-packages
            /usr/local/bin/cfn-signal \
              --exit-code $? \
              --stack "${AWS::StackName}" \
              --resource MemgraphEC2Instance \
              --region "${AWS::Region}"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-memgraph"
        - Key: Project
          Value: ExpertiseRAG
        - Key: ManagedBy
          Value: CloudFormation

  # ── Elastic IP ───────────────────────────────────────────────────────────────

  MemgraphEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-memgraph-eip"
        - Key: Project
          Value: ExpertiseRAG

  MemgraphEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref MemgraphEC2Instance
      EIP: !Ref MemgraphEIP

  # ── SSM Parameters ───────────────────────────────────────────────────────────

  SSMParamMemgraphHost:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /memgraph/host
      Type: String
      Value: !Ref MemgraphEIP
      Description: Memgraph public IP address

  SSMParamMemgraphPort:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /memgraph/port
      Type: String
      Value: "7687"
      Description: Memgraph Bolt port

  SSMParamMemgraphBoltURL:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /memgraph/bolt_url
      Type: String
      Value: !Sub "bolt://${MemgraphEIP}:7687"
      Description: Memgraph Bolt connection URL

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  MemgraphPublicIP:
    Description: Memgraph EC2 public IP (Elastic IP)
    Value: !Ref MemgraphEIP

  MemgraphBoltURL:
    Description: Memgraph Bolt connection URL
    Value: !Sub "bolt://${MemgraphEIP}:7687"

  MemgraphLabURL:
    Description: Memgraph Lab UI URL
    Value: !Sub "http://${MemgraphEIP}:7444"

  SSHCommand:
    Description: SSH command to connect to the instance
    Value: !Sub "ssh -i ${KeyPairName}.pem ubuntu@${MemgraphEIP}"

  SSMSessionCommand:
    Description: SSM Session Manager connect command (no SSH key required)
    Value: !Sub "aws ssm start-session --target ${MemgraphEC2Instance}"
