name: SAM Deploy – ExpertiseRAG

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Permissions required for OIDC token exchange with AWS
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write   # Required: allow GitHub to create OIDC JWT
  contents: read    # Required: allow checkout

# ─────────────────────────────────────────────────────────────────────────────
# Environment variables shared across all jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "239571291755"
  DEPLOY_ROLE_ARN: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
  SAM_TEMPLATE: template.yaml
  STACK_NAME_PROD: expertise-rag-prod

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: validate – runs on every push and PR
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: SAM Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM validate
        run: sam validate --template ${{ env.SAM_TEMPLATE }} --region ${{ env.AWS_REGION }} --lint

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: build – compile and verify the SAM build succeeds
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: SAM Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build --template ${{ env.SAM_TEMPLATE }} --parallel

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: deploy-prod – runs on push to main/master and workflow_dispatch
  # ───────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy – prod
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: prod   # Requires manual approval configured in GitHub repo settings

    outputs:
      artifacts_bucket: ${{ steps.stack-outputs.outputs.artifacts_bucket }}
      api_endpoint: ${{ steps.stack-outputs.outputs.api_endpoint }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-prod-${{ github.run_id }}

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build --template ${{ env.SAM_TEMPLATE }} --parallel

      - name: SAM deploy – prod
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --config-env prod \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment=prod \
              NeptuneProvisionedMemory=16 \
              LogRetentionDays=365 \
              GenerationModelId=anthropic.claude-3-5-sonnet-20241022-v2:0 \
            --tags \
              Project=ExpertiseRAG \
              Environment=prod \
              ManagedBy=GitHubActions \
              GitSha=${{ github.sha }} \
              CostCenter=Engineering

      - name: Capture stack outputs
        id: stack-outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ArtifactsBucketName'].OutputValue" \
            --output text)
          API=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='APIEndpoint'].OutputValue" \
            --output text)
          KB_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='KnowledgeBaseId'].OutputValue" \
            --output text)
          DS_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='DataSourceId'].OutputValue" \
            --output text)
          echo "artifacts_bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "api_endpoint=$API" >> "$GITHUB_OUTPUT"
          echo "knowledge_base_id=$KB_ID" >> "$GITHUB_OUTPUT"
          echo "data_source_id=$DS_ID" >> "$GITHUB_OUTPUT"
          echo "### Deploy Outputs (prod)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifacts bucket**: \`$BUCKET\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **API endpoint**: $API" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Knowledge Base ID**: \`$KB_ID\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Push repo signals and docs to S3
        run: |
          BUCKET="${{ steps.stack-outputs.outputs.artifacts_bucket }}"
          REPO="contextweave"
          PREFIX="raw/${REPO}"

          echo "Uploading repo signals and documentation to s3://${BUCKET}/${PREFIX}/"

          # repo-signals.yaml – structured expertise signals (highest authority)
          aws s3 cp repo-signals.yaml \
            "s3://${BUCKET}/${PREFIX}/repo-signals.yaml" \
            --region ${{ env.AWS_REGION }} \
            --metadata "source=github-actions,sha=${{ github.sha }},env=prod"

          # CLAUDE.md – authoritative project context
          aws s3 cp CLAUDE.md \
            "s3://${BUCKET}/${PREFIX}/CLAUDE.md" \
            --region ${{ env.AWS_REGION }} \
            --metadata "source=github-actions,sha=${{ github.sha }},env=prod"

          # Architecture docs
          aws s3 cp docs/architecture.md \
            "s3://${BUCKET}/${PREFIX}/architecture.md" \
            --region ${{ env.AWS_REGION }} \
            --metadata "source=github-actions,sha=${{ github.sha }},env=prod"

          # PlantUML diagrams
          for puml in docs/*.puml; do
            [ -f "$puml" ] || continue
            filename=$(basename "$puml")
            aws s3 cp "$puml" \
              "s3://${BUCKET}/${PREFIX}/${filename}" \
              --region ${{ env.AWS_REGION }} \
              --metadata "source=github-actions,sha=${{ github.sha }},env=prod"
          done

          echo "Upload complete."

      - name: Trigger Bedrock KB ingestion
        run: |
          KB_ID="${{ steps.stack-outputs.outputs.knowledge_base_id }}"
          DS_ID="${{ steps.stack-outputs.outputs.data_source_id }}"

          echo "Starting ingestion job for KB=$KB_ID DS=$DS_ID"
          JOB_ID=$(aws bedrock-agent start-ingestion-job \
            --knowledge-base-id "$KB_ID" \
            --data-source-id "$DS_ID" \
            --region ${{ env.AWS_REGION }} \
            --query "ingestionJob.ingestionJobId" \
            --output text)
          echo "Ingestion job started: $JOB_ID"
          echo "ingestion_job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

          # Poll until complete (max ~10 min)
          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(aws bedrock-agent get-ingestion-job \
              --knowledge-base-id "$KB_ID" \
              --data-source-id "$DS_ID" \
              --ingestion-job-id "$JOB_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "ingestionJob.status" \
              --output text)
            echo "[$i/20] Ingestion status: $STATUS"
            if [ "$STATUS" = "COMPLETE" ]; then
              echo "Ingestion complete."
              echo "### Ingestion" >> "$GITHUB_STEP_SUMMARY"
              echo "- Job \`$JOB_ID\` completed successfully" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            elif [ "$STATUS" = "FAILED" ]; then
              echo "Ingestion job failed."
              exit 1
            fi
          done
          echo "Ingestion timed out after 10 minutes – job $JOB_ID may still be running."
