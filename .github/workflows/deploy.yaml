name: SAM Deploy – ExpertiseRAG

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Permissions required for OIDC token exchange with AWS
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write   # Required: allow GitHub to create OIDC JWT
  contents: read    # Required: allow checkout

# ─────────────────────────────────────────────────────────────────────────────
# Environment variables shared across all jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "239571291755"
  DEPLOY_ROLE_ARN: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
  SAM_TEMPLATE: template.yaml
  STACK_NAME_PROD: contextweave-rag-prod

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: validate – runs on every push and PR
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: SAM Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM validate
        run: sam validate --template ${{ env.SAM_TEMPLATE }} --region ${{ env.AWS_REGION }} --lint

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: build – compile and verify the SAM build succeeds
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: SAM Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build --template ${{ env.SAM_TEMPLATE }} --parallel

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: deploy-prod – runs on push to main/master and workflow_dispatch
  # ───────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy – prod
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: prod   # Requires manual approval configured in GitHub repo settings

    outputs:
      artifacts_bucket: ${{ steps.stack-outputs.outputs.artifacts_bucket }}
      api_endpoint: ${{ steps.stack-outputs.outputs.api_endpoint }}
      sf_arn: ${{ steps.stack-outputs.outputs.sf_arn }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-prod-${{ github.run_id }}

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      # When a stack is deleted, ArtifactsBucket is retained (DeletionPolicy:
      # Retain).  If we then try to create a new stack, CloudFormation fails
      # trying to create a bucket that already exists.  Detect this case and
      # import the existing bucket into the new stack so SAM deploy proceeds
      # cleanly without re-creating (or re-uploading to) the bucket.
      - name: Import retained S3 bucket into new stack (if needed)
        run: |
          STACK_NAME="${{ env.STACK_NAME_PROD }}"
          REGION="${{ env.AWS_REGION }}"
          BUCKET="contextweave-rag-artifacts-${{ env.AWS_ACCOUNT_ID }}-prod"

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$REGION" \
            --query "Stacks[0].StackStatus" --output text 2>/dev/null \
            || echo "DOES_NOT_EXIST")

          if [ "$STACK_STATUS" != "DOES_NOT_EXIST" ]; then
            echo "Stack already exists ($STACK_STATUS) – import not needed."
            exit 0
          fi

          if ! aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
            echo "Bucket $BUCKET not found – nothing to import."
            exit 0
          fi

          echo "Retained bucket $BUCKET found; importing into new stack..."

          aws cloudformation create-change-set \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --change-set-name import-retained-bucket \
            --change-set-type IMPORT \
            --resources-to-import \
              "[{\"ResourceType\":\"AWS::S3::Bucket\",\"LogicalResourceId\":\"ArtifactsBucket\",\"ResourceIdentifier\":{\"BucketName\":\"$BUCKET\"}}]" \
            --template-body \
              "{\"AWSTemplateFormatVersion\":\"2010-09-09\",\"Resources\":{\"ArtifactsBucket\":{\"Type\":\"AWS::S3::Bucket\",\"DeletionPolicy\":\"Retain\",\"UpdateReplacePolicy\":\"Retain\",\"Properties\":{\"BucketName\":\"$BUCKET\"}}}}"

          aws cloudformation wait change-set-create-complete \
            --stack-name "$STACK_NAME" \
            --change-set-name import-retained-bucket \
            --region "$REGION"

          aws cloudformation execute-change-set \
            --stack-name "$STACK_NAME" \
            --change-set-name import-retained-bucket \
            --region "$REGION"

          echo "Waiting for import to complete..."
          for i in $(seq 1 24); do
            sleep 5
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "$REGION" \
              --query "Stacks[0].StackStatus" --output text)
            echo "[$i] $STATUS"
            case "$STATUS" in
              IMPORT_COMPLETE) echo "Import complete."; exit 0 ;;
              IMPORT_ROLLBACK_COMPLETE|IMPORT_ROLLBACK_FAILED|ROLLBACK_COMPLETE)
                echo "Import failed with status $STATUS"; exit 1 ;;
            esac
          done
          echo "Timed out waiting for import"; exit 1

      # If a previous deploy left the stack in UPDATE_ROLLBACK_FAILED the next
      # sam deploy will immediately fail with "Stack is in UPDATE_ROLLBACK_FAILED
      # state and can not be updated".  Detect that state here and call
      # continue-update-rollback, skipping any resource that is itself stuck in
      # UPDATE_FAILED, so the stack reaches UPDATE_ROLLBACK_COMPLETE before we
      # attempt a fresh deploy.
      - name: Recover stack from UPDATE_ROLLBACK_FAILED (if needed)
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME_PROD }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Current stack status: $STATUS"

          if [ "$STATUS" != "UPDATE_ROLLBACK_FAILED" ]; then
            echo "No recovery needed."
            exit 0
          fi

          echo "Stack is stuck in UPDATE_ROLLBACK_FAILED – collecting failed resources..."

          # Only resources whose rollback genuinely failed (not ones that were
          # cascade-cancelled) may be passed to --resources-to-skip.
          # Filter out any event where ResourceStatusReason contains "cancelled".
          FAILED=$(aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME_PROD }}" \
            --region "${{ env.AWS_REGION }}" \
            --max-items 200 \
            --output json \
          | jq -r '
              .StackEvents[]
              | select(
                  .ResourceStatus == "UPDATE_FAILED" and
                  ((.ResourceStatusReason // "") | ascii_downcase | contains("cancelled") | not)
                )
              | .LogicalResourceId
            ' \
          | sort -u | tr '\n' ' ' | xargs)

          echo "Resources to skip: $FAILED"

          if [ -z "$FAILED" ]; then
            echo "No UPDATE_FAILED resources found; attempting bare continue-update-rollback."
            aws cloudformation continue-update-rollback \
              --stack-name "${{ env.STACK_NAME_PROD }}" \
              --region "${{ env.AWS_REGION }}"
          else
            aws cloudformation continue-update-rollback \
              --stack-name "${{ env.STACK_NAME_PROD }}" \
              --region "${{ env.AWS_REGION }}" \
              --resources-to-skip $FAILED
          fi

          echo "Waiting for rollback to complete..."
          aws cloudformation wait stack-rollback-complete \
            --stack-name "${{ env.STACK_NAME_PROD }}" \
            --region "${{ env.AWS_REGION }}"

          echo "Stack recovered to UPDATE_ROLLBACK_COMPLETE."

      - name: SAM build
        run: sam build --template ${{ env.SAM_TEMPLATE }} --parallel

      - name: Fetch shared infrastructure outputs
        id: shared-infra
        run: |
          SHARED_STACK="tarun-teamweave-shared"
          REGION="${{ env.AWS_REGION }}"

          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "$SHARED_STACK" \
              --region "$REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }

          # These keys are directly exported by the shared stack
          SUBNET_AZ1=$(get_output LambdaSubnetAz1Id)
          SUBNET_AZ2=$(get_output LambdaSubnetAz2Id)

          # VpcId is not exported – derive it from one of the Lambda subnets
          VPC_ID=$(aws ec2 describe-subnets \
            --subnet-ids "$SUBNET_AZ1" \
            --region "$REGION" \
            --query "Subnets[0].VpcId" \
            --output text)

          # PublicSubnetAz1Id is not exported – find the first public subnet in the VPC
          PUBLIC_SUBNET=$(aws ec2 describe-subnets \
            --filters \
              "Name=vpc-id,Values=$VPC_ID" \
              "Name=map-public-ip-on-launch,Values=true" \
            --region "$REGION" \
            --query "Subnets[0].SubnetId" \
            --output text)

          # Fail fast if any required value is empty
          for VAR_NAME in VPC_ID SUBNET_AZ1 SUBNET_AZ2 PUBLIC_SUBNET; do
            VAL="${!VAR_NAME}"
            if [ -z "$VAL" ] || [ "$VAL" = "None" ]; then
              echo "ERROR: $VAR_NAME is empty – check tarun-teamweave-shared outputs"
              exit 1
            fi
          done

          echo "vpc_id=$VPC_ID"                   >> "$GITHUB_OUTPUT"
          echo "lambda_subnet_az1=$SUBNET_AZ1"  >> "$GITHUB_OUTPUT"
          echo "lambda_subnet_az2=$SUBNET_AZ2"  >> "$GITHUB_OUTPUT"
          echo "public_subnet_az1=$PUBLIC_SUBNET" >> "$GITHUB_OUTPUT"

          echo "### Shared Infrastructure" >> "$GITHUB_STEP_SUMMARY"
          echo "- VPC: \`$VPC_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lambda subnets: \`$SUBNET_AZ1\`, \`$SUBNET_AZ2\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Public subnet (Memgraph): \`$PUBLIC_SUBNET\`" >> "$GITHUB_STEP_SUMMARY"

      - name: SAM deploy – prod
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --config-env prod \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment=prod \
              LogRetentionDays=365 \
              GenerationModelId=us.amazon.nova-pro-v1:0 \
              SharedVpcId=${{ steps.shared-infra.outputs.vpc_id }} \
              SharedLambdaSubnetAz1Id=${{ steps.shared-infra.outputs.lambda_subnet_az1 }} \
              SharedLambdaSubnetAz2Id=${{ steps.shared-infra.outputs.lambda_subnet_az2 }} \
              SharedPublicSubnetAz1Id=${{ steps.shared-infra.outputs.public_subnet_az1 }} \
            --tags \
              Project=ExpertiseRAG \
              Environment=prod \
              ManagedBy=GitHubActions \
              GitSha=${{ github.sha }} \
              CostCenter=Engineering

      - name: Capture stack outputs
        id: stack-outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ArtifactsBucketName'].OutputValue" \
            --output text)
          API=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='APIEndpoint'].OutputValue" \
            --output text)
          SF_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME_PROD }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='IngestionStateMachineArn'].OutputValue" \
            --output text)
          echo "artifacts_bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "api_endpoint=$API" >> "$GITHUB_OUTPUT"
          echo "sf_arn=$SF_ARN" >> "$GITHUB_OUTPUT"
          echo "### Deploy Outputs (prod)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifacts bucket**: \`$BUCKET\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **API endpoint**: $API" >> "$GITHUB_STEP_SUMMARY"

      - name: Stage Memgraph Docker image to S3
        run: |
          BUCKET="contextweave-rag-artifacts-${{ env.AWS_ACCOUNT_ID }}-prod"
          S3_KEY="binaries/memgraph-3.8.1.tar.gz"
          # Skip if already staged (avoids re-uploading ~400 MB on every deploy)
          if aws s3 ls "s3://${BUCKET}/${S3_KEY}" --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Memgraph image already staged at s3://${BUCKET}/${S3_KEY} – skipping."
          else
            echo "Pulling memgraph/memgraph:3.8.1 and staging to S3..."
            docker pull memgraph/memgraph:3.8.1
            docker save memgraph/memgraph:3.8.1 | gzip > /tmp/memgraph-3.8.1.tar.gz
            aws s3 cp /tmp/memgraph-3.8.1.tar.gz \
              "s3://${BUCKET}/${S3_KEY}" \
              --region ${{ env.AWS_REGION }}
            rm /tmp/memgraph-3.8.1.tar.gz
            echo "Staged successfully."
          fi

      - name: Push repo signals and docs to S3
        run: |
          BUCKET="${{ steps.stack-outputs.outputs.artifacts_bucket }}"
          REPO="contextweave"
          PREFIX="raw/${REPO}"

          echo "Uploading repo signals and documentation to s3://${BUCKET}/${PREFIX}/"

          # repo-signals.yaml – structured expertise signals (machine-readable)
          aws s3 cp repo-signals.yaml \
            "s3://${BUCKET}/${PREFIX}/repo-signals.yaml" \
            --region ${{ env.AWS_REGION }} \
            --metadata "source=github-actions,sha=${{ github.sha }},env=prod"

          # docs/repo-signals.md – markdown rendering of repo-signals.yaml
          aws s3 cp docs/repo-signals.md \
            "s3://${BUCKET}/${PREFIX}/repo-signals.md" \
            --region ${{ env.AWS_REGION }} \
            --metadata "source=github-actions,sha=${{ github.sha }},env=prod"

          # CLAUDE.md – authoritative project context
          aws s3 cp CLAUDE.md \
            "s3://${BUCKET}/${PREFIX}/CLAUDE.md" \
            --region ${{ env.AWS_REGION }} \
            --metadata "source=github-actions,sha=${{ github.sha }},env=prod"

          # Architecture docs
          aws s3 cp docs/architecture.md \
            "s3://${BUCKET}/${PREFIX}/architecture.md" \
            --region ${{ env.AWS_REGION }} \
            --metadata "source=github-actions,sha=${{ github.sha }},env=prod"

          # PlantUML diagrams
          for puml in docs/*.puml; do
            [ -f "$puml" ] || continue
            filename=$(basename "$puml")
            aws s3 cp "$puml" \
              "s3://${BUCKET}/${PREFIX}/${filename}" \
              --region ${{ env.AWS_REGION }} \
              --metadata "source=github-actions,sha=${{ github.sha }},env=prod"
          done

          echo "Upload complete."

      - name: Ingest all raw/ repos via Step Functions
        run: |
          BUCKET="${{ steps.stack-outputs.outputs.artifacts_bucket }}"
          SF_ARN="${{ steps.stack-outputs.outputs.sf_arn }}"

          if [ -z "$SF_ARN" ] || [ "$SF_ARN" = "None" ]; then
            echo "No Step Functions state machine provisioned."
            echo "S3 notifications will trigger the preprocessor automatically as files are uploaded."
            exit 0
          fi

          # Discover every repo folder under raw/
          REPOS=$(aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix "raw/" \
            --delimiter "/" \
            --region ${{ env.AWS_REGION }} \
            --query "CommonPrefixes[].Prefix" \
            --output text)

          if [ -z "$REPOS" ]; then
            echo "No sub-prefixes found under s3://${BUCKET}/raw/ – nothing to ingest."
            exit 0
          fi

          echo "Repos to ingest:"
          for REPO_PREFIX in $REPOS; do
            echo "  $REPO_PREFIX"
          done

          # Fan out: start one execution per repo
          declare -A EXEC_ARNS
          for REPO_PREFIX in $REPOS; do
            EXEC_ARN=$(aws stepfunctions start-execution \
              --state-machine-arn "$SF_ARN" \
              --name "deploy-$(echo "$REPO_PREFIX" | tr '/' '-' | tr -d '-' | cut -c1-40)-${{ github.run_id }}" \
              --input "{\"repo_prefix\": \"${REPO_PREFIX}\", \"bucket\": \"${BUCKET}\", \"trigger_source\": \"github-actions\"}" \
              --region ${{ env.AWS_REGION }} \
              --query "executionArn" \
              --output text)
            EXEC_ARNS["$REPO_PREFIX"]="$EXEC_ARN"
            echo "Started: $REPO_PREFIX → $EXEC_ARN"
          done

          # Poll all executions until each reaches a terminal state (max ~10 min)
          FAILED=0
          declare -A DONE
          for i in $(seq 1 20); do
            sleep 30
            ALL_DONE=true
            for REPO_PREFIX in $REPOS; do
              [ "${DONE[$REPO_PREFIX]+_}" ] && continue
              EXEC_ARN="${EXEC_ARNS[$REPO_PREFIX]}"
              STATUS=$(aws stepfunctions describe-execution \
                --execution-arn "$EXEC_ARN" \
                --region ${{ env.AWS_REGION }} \
                --query "status" \
                --output text)
              echo "[$i/20] $REPO_PREFIX → $STATUS"
              case "$STATUS" in
                SUCCEEDED)
                  DONE["$REPO_PREFIX"]=1
                  ;;
                FAILED|ABORTED|TIMED_OUT)
                  echo "ERROR: execution for $REPO_PREFIX $STATUS"
                  DONE["$REPO_PREFIX"]=1
                  FAILED=$((FAILED + 1))
                  ;;
                *)
                  ALL_DONE=false
                  ;;
              esac
            done
            $ALL_DONE && break
          done

          # Step summary
          echo "### Ingestion Results" >> "$GITHUB_STEP_SUMMARY"
          for REPO_PREFIX in $REPOS; do
            EXEC_ARN="${EXEC_ARNS[$REPO_PREFIX]}"
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" \
              --region ${{ env.AWS_REGION }} \
              --query "status" \
              --output text)
            ICON="✓"; [ "$STATUS" != "SUCCEEDED" ] && ICON="✗"
            echo "- ${ICON} \`${REPO_PREFIX}\` → ${STATUS}" >> "$GITHUB_STEP_SUMMARY"
          done

          [ "$FAILED" -gt 0 ] && exit 1
          echo "All ingestion executions succeeded."
