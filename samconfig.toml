version = 0.1

# ─────────────────────────────────────────────────────────────────────────────
# ExpertiseRAG SAM deployment configuration
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   sam build && sam deploy           # uses [default.deploy.parameters]
#   sam deploy --config-env staging   # uses [staging.deploy.parameters]
#   sam deploy --config-env prod      # uses [prod.deploy.parameters]
#
# Graph backend: Memgraph Community on EC2 (replaces Neptune Analytics)
# Vector store:  OpenSearch Serverless (replaces Neptune Analytics KB backend)
#
# Required before first deploy:
#   1. Create an EC2 Key Pair in us-east-1 (or leave KeyPairName="" to use SSM only)
#   2. Set AllowedCidr to your IP range to restrict Bolt/SSH access
# ─────────────────────────────────────────────────────────────────────────────

[default]
[default.global.parameters]
stack_name = "expertise-rag-dev"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name           = "expertise-rag-dev"
s3_prefix            = "expertise-rag"
region               = "us-east-1"
confirm_changeset    = true
capabilities         = "CAPABILITY_NAMED_IAM"
disable_rollback     = false
# TODO: Replace 'your-sam-deployment-bucket' with your SAM artifacts bucket
# or let SAM create a managed bucket by omitting s3_bucket.
# s3_bucket          = "your-sam-deployment-bucket"
parameter_overrides  = [
    "Environment=dev",
    "EmbeddingDimension=1024",
    "LogRetentionDays=30",
    "EnableStepFunctions=true",
    "GenerationModelId=us.amazon.nova-pro-v1:0",
    "KeyPairName=",
    "AllowedCidr=0.0.0.0/0",
    "VpcCidr=10.10.0.0/16",
    "SubnetCidr=10.10.1.0/24",
    "MemgraphDockerImage=memgraph/memgraph-platform:latest",
]
tags = [
    "Project=ExpertiseRAG",
    "Environment=dev",
    "ManagedBy=SAM",
]

# ─────────────────────────────────────────────────────────────────────────────
# Staging environment
# ─────────────────────────────────────────────────────────────────────────────
[staging]
[staging.deploy.parameters]
stack_name           = "expertise-rag-staging"
s3_prefix            = "expertise-rag-staging"
region               = "us-east-1"
confirm_changeset    = true
capabilities         = "CAPABILITY_NAMED_IAM"
parameter_overrides  = [
    "Environment=staging",
    "EmbeddingDimension=1024",
    "LogRetentionDays=60",
    "EnableStepFunctions=true",
    "KeyPairName=",
    "AllowedCidr=0.0.0.0/0",
    "VpcCidr=10.10.0.0/16",
    "SubnetCidr=10.10.1.0/24",
    "MemgraphDockerImage=memgraph/memgraph-platform:latest",
]
tags = [
    "Project=ExpertiseRAG",
    "Environment=staging",
    "ManagedBy=SAM",
]

# ─────────────────────────────────────────────────────────────────────────────
# Production environment
# ─────────────────────────────────────────────────────────────────────────────
[prod]
[prod.deploy.parameters]
stack_name           = "expertise-rag-prod"
s3_prefix            = "expertise-rag-prod"
region               = "us-east-1"
confirm_changeset    = true
capabilities         = "CAPABILITY_NAMED_IAM"
disable_rollback     = false
parameter_overrides  = [
    "Environment=prod",
    "EmbeddingDimension=1024",
    "LogRetentionDays=365",
    "EnableStepFunctions=true",
    "KeyPairName=",
    "AllowedCidr=0.0.0.0/0",
    "VpcCidr=10.10.0.0/16",
    "SubnetCidr=10.10.1.0/24",
    "MemgraphDockerImage=memgraph/memgraph-platform:latest",
]
tags = [
    "Project=ExpertiseRAG",
    "Environment=prod",
    "ManagedBy=SAM",
    "CostCenter=Engineering",
]
