version = 0.1

# ─────────────────────────────────────────────────────────────────────────────
# ExpertiseRAG SAM deployment configuration
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   sam build && sam deploy           # uses [default.deploy.parameters]
#   sam deploy --config-env staging   # uses [staging.deploy.parameters]
#   sam deploy --config-env prod      # uses [prod.deploy.parameters]
# ─────────────────────────────────────────────────────────────────────────────

[default]
[default.global.parameters]
stack_name = "contextweave-rag-dev"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name           = "contextweave-rag-dev"
s3_prefix            = "contextweave-rag"
region               = "us-east-1"
confirm_changeset    = true
capabilities         = "CAPABILITY_NAMED_IAM"
disable_rollback     = false
# TODO: Replace 'your-sam-deployment-bucket' with your SAM artifacts bucket
# or let SAM create a managed bucket by omitting s3_bucket.
# s3_bucket          = "your-sam-deployment-bucket"
# Shared-infra values are resolved from the tarun-teamweave-shared stack at
# deploy time by the GitHub Actions workflow (Fetch shared infrastructure
# outputs step).  For local deploys, populate the five Shared* overrides
# by running:
#   aws cloudformation describe-stacks --stack-name tarun-teamweave-shared \
#     --query "Stacks[0].Outputs"
parameter_overrides  = [
    "Environment=dev",
    "LogRetentionDays=30",
    "EnableStepFunctions=true",
    "GenerationModelId=us.amazon.nova-pro-v1:0",
    "SharedVpcId=<VpcId from tarun-teamweave-shared>",
    "SharedLambdaSubnetAz1Id=<LambdaSubnetAz1Id from tarun-teamweave-shared>",
    "SharedLambdaSubnetAz2Id=<LambdaSubnetAz2Id from tarun-teamweave-shared>",
    "SharedPublicSubnetAz1Id=<PublicSubnetAz1Id from tarun-teamweave-shared>",
    "SharedObservatoryMetricsTableName=<ObservatoryMetricsTableName from tarun-teamweave-shared>",
    "SharedObservatoryMetricsTableArn=<ObservatoryMetricsTableArn from tarun-teamweave-shared>",
]
tags = [
    "Project=ExpertiseRAG",
    "Environment=dev",
    "ManagedBy=SAM",
]

# ─────────────────────────────────────────────────────────────────────────────
# Staging environment
# ─────────────────────────────────────────────────────────────────────────────
[staging]
[staging.deploy.parameters]
stack_name           = "contextweave-rag-staging"
s3_prefix            = "contextweave-rag-staging"
region               = "us-east-1"
confirm_changeset    = true
capabilities         = "CAPABILITY_NAMED_IAM"
parameter_overrides  = [
    "Environment=staging",
    "LogRetentionDays=60",
    "EnableStepFunctions=true",
    "SharedVpcId=<VpcId from tarun-teamweave-shared>",
    "SharedLambdaSubnetAz1Id=<LambdaSubnetAz1Id from tarun-teamweave-shared>",
    "SharedLambdaSubnetAz2Id=<LambdaSubnetAz2Id from tarun-teamweave-shared>",
    "SharedPublicSubnetAz1Id=<PublicSubnetAz1Id from tarun-teamweave-shared>",
    "SharedObservatoryMetricsTableName=<ObservatoryMetricsTableName from tarun-teamweave-shared>",
    "SharedObservatoryMetricsTableArn=<ObservatoryMetricsTableArn from tarun-teamweave-shared>",
]
tags = [
    "Project=ExpertiseRAG",
    "Environment=staging",
    "ManagedBy=SAM",
]

# ─────────────────────────────────────────────────────────────────────────────
# Production environment
# ─────────────────────────────────────────────────────────────────────────────
[prod]
[prod.deploy.parameters]
stack_name           = "contextweave-rag-prod"
s3_prefix            = "contextweave-rag-prod"
region               = "us-east-1"
confirm_changeset    = true
capabilities         = "CAPABILITY_NAMED_IAM"
disable_rollback     = false
parameter_overrides  = [
    "Environment=prod",
    "LogRetentionDays=365",
    "EnableStepFunctions=true",
    "SharedVpcId=<VpcId from tarun-teamweave-shared>",
    "SharedLambdaSubnetAz1Id=<LambdaSubnetAz1Id from tarun-teamweave-shared>",
    "SharedLambdaSubnetAz2Id=<LambdaSubnetAz2Id from tarun-teamweave-shared>",
    "SharedPublicSubnetAz1Id=<PublicSubnetAz1Id from tarun-teamweave-shared>",
    "SharedObservatoryMetricsTableName=<ObservatoryMetricsTableName from tarun-teamweave-shared>",
    "SharedObservatoryMetricsTableArn=<ObservatoryMetricsTableArn from tarun-teamweave-shared>",
]
tags = [
    "Project=ExpertiseRAG",
    "Environment=prod",
    "ManagedBy=SAM",
    "CostCenter=Engineering",
]
